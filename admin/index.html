<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imobiliária Corporativa | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="main-title">Aba de Operações</h1>
                <p class="m-0 text-muted">Cadastro e Monitoramento de Ativos Imobiliários</p>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span style="width: 10px; height: 10px; background-color: var(--success); border-radius: 50%;"></span>
                <span class="small fw-semibold" style="color: #ffffff;">Servidor Java Conectado</span>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="dashboard-card">
                    <h2 class="section-title">Cadastrar Novo Registro</h2>
                    
                    <form id="formImovel">
                        <div class="input-group-custom">
                            <label class="input-label" for="endereco">Endereço Completo</label>
                            <input type="text" id="endereco" class="form-input" placeholder="Rua, Número, Bairro e Cidade" required>
                        </div>
                        
                        <div class="row g-3">
                            <div class="col-6">
                                <div class="input-group-custom">
                                    <label class="input-label" for="quartos">Total de Quartos</label>
                                    <input type="number" id="quartos" class="form-input" placeholder="0" min="0" required>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="input-group-custom">
                                    <label class="input-label" for="banheiros">Banheiros</label>
                                    <input type="number" id="banheiros" class="form-input" placeholder="0" min="0" required>
                                </div>
                            </div>
                        </div>

                        <div class="input-group-custom">
                            <label class="input-label" for="preco">Preço de Venda (R$)</label>
                            <input type="number" id="preco" class="form-input" step="0.01" placeholder="Ex: 500000.00" required>
                        </div>

                        <div class="row g-3">
                            <div class="col-6">
                                <div class="input-group-custom">
                                    <label class="input-label" for="vagasGaragem">Vagas na Garagem</label>
                                    <input type="number" id="vagasGaragem" class="form-input" placeholder="0" min="0" required>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="input-group-custom">
                                    <label class="input-label" for="suites">Suítes Disponíveis</label>
                                    <input type="number" id="suites" class="form-input" placeholder="0" min="0" required>
                                </div>
                            </div>
                        </div>

                        <div class="input-group-custom d-flex align-items-center gap-3 py-2">
                            <input type="checkbox" id="disponivel" style="width: 18px; height: 18px; cursor: pointer;" checked>
                            <label for="disponivel" class="m-0 text-white small fw-semibold" style="cursor: pointer;">Disponibilizar para venda imediatamente</label>
                        </div>

                        <button type="submit" class="btn-submit mt-3">Salvar Ativo no Banco de Dados</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="dashboard-card h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="section-title m-0">Registros no Banco de Dados</h2>
                        <button type="button" onclick="carregarImoveis()" class="btn-sync">Sincronizar Lista</button>
                    </div>

                    <div class="table-responsive">
                        <table class="premium-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Localização</th>
                                    <th>Especificação Interna</th>
                                    <th>Preço Avaliado</th>
                                    <th>Status Atual</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaImoveis">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
