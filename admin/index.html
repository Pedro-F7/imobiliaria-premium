<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imobiliária Premium - Backoffice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar-admin">
        <div class="nav-brand">🏢 Imobiliária <span>Premium</span> <small>Backoffice v2.0</small></div>
    </header>

    <div class="container-admin">
        <div class="card-formulario">
            <h3>Novo Ativo</h3>
            <p class="subtitle">Insira as informações do imóvel para publicação imediata.</p>
            
            <form id="form-imovel">
                <div class="input-block">
                    <label>NOME / TÍTULO DO IMÓVEL</label>
                    <input type="text" id="titulo" placeholder="Ex: Casa de 109m² com 3 Quartos" required>
                </div>

                <div class="input-block">
                    <label>ENDEREÇO COMPLETO</label>
                    <input type="text" id="endereco" placeholder="Ex: Av. Paulista, 1200 - Apto 42" required>
                </div>

                <div class="input-block">
                    <label>TIPO DO IMÓVEL</label>
                    <select id="tipo">
                        <option value="Casa">🏡 Casa</option>
                        <option value="Apartamento">🏢 Apartamento</option>
                    </select>
                </div>

                <div class="input-block">
                    <label>PREÇO DE VENDA (R$)</label>
                    <div class="input-with-prefix">
                        <span>R$</span>
                        <input type="number" id="preco" step="0.01" placeholder="0,00" required>
                    </div>
                </div>

                <div class="grid-tres-colunas">
                    <div class="input-block">
                        <label>QUARTOS</label>
                        <input type="number" id="quartos" value="1" min="0">
                    </div>
                    <div class="input-block">
                        <label>BANHEIROS</label>
                        <input type="number" id="banheiros" value="1" min="0">
                    </div>
                    <div class="input-block">
                        <label>VAGAS</label>
                        <input type="number" id="vagas" value="0" min="0">
                    </div>
                </div>

                <div class="input-block">
                    <label>FOTO DO IMÓVEL (OPCIONAL)</label>
                    <label for="foto-arquivo" class="custom-file-upload">
                        📁 Selecionar Imagem...
                    </label>
                    <input type="file" id="foto-arquivo" accept="image/*">
                    <span id="file-name" class="file-name-txt">Nenhum arquivo selecionado</span>
                </div>

                <button type="submit" class="btn-submit">Publicar Imóvel</button>
            </form>
        </div>

        <div class="card-tabela">
            <h3>Banco de Dados Ativo</h3>
            <p class="subtitle">Monitoramento em tempo real dos registros no MySQL.</p>
            
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ESPECIFICAÇÃO</th>
                            <th>LOCALIZAÇÃO</th>
                            <th>VALOR DE MERCADO</th>
                            <th style="text-align: center;">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-imoveis">
                        </tbody>
                </table>
                <div id="tabela-vazia" class="empty-state">Nenhum imóvel indexado no MySQL.</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
