server.port=8000

# URL de conexão: o comando "createDatabaseIfNotExist=true" manda o MySQL criar o banco se ele não achar
spring.datasource.url=jdbc:mysql://localhost:3306/imobiliaria?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root

# ⚠️ MUDE AQUI: Coloque a sua senha real do MySQL entre o sinal de =
# Se o seu MySQL não tem senha, deixe em branco depois do igual (ex: spring.datasource.password=)
spring.datasource.password=1902

# Configurações do Hibernate para o MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update