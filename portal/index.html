<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Imóveis - Encontre seu imóvel ideal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar-portal">
        <div class="navbar-container">
            <h1 class="logo-portal">premium<span>imóveis</span></h1>
            <nav class="menu-links">
                <a href="#" class="active">Descobrir Ativos</a>
                <a href="../admin/index.html" target="_blank">Painel Gerente</a>
            </nav>
            <div class="auth-buttons">
                <button class="btn-criar-conta">Criar conta</button>
                <button class="btn-entrar">Entrar</button>
            </div>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-left">
            <div class="card-busca">
                <h2 class="titulo-busca">A casa que você quer está aqui. Só na Premiumimóveis você encontra os melhores imóveis.</h2>
                
                <div class="abas-busca">
                    <button class="aba-btn active" data-tipo="Casa"><i class="fa-solid fa-house"></i> Casas</button>
                    <button class="aba-btn" data-tipo="Apartamento"><i class="fa-solid fa-building"></i> Apartamentos</button>
                    <button class="aba-btn" data-tipo="Lancamento"><i class="fa-solid fa-rocket"></i> Lançamentos</button>
                </div>

                <div class="form-busca">
                    <div class="input-grupo">
                        <label>Onde deseja morar?</label>
                        <div class="input-with-icon">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" id="input-localidade" placeholder="Digite um bairro ou endereço...">
                        </div>
                    </div>
                    <button class="btn-buscar-submit" id="btn-filtrar-pesquisa">Filtrar Ativos</button>
                </div>
            </div>
        </div>
        <div class="hero-right"></div>
    </section>

    <main class="vitrine-section">
        <h3 class="chamada-vitrine" id="titulo-vitrine">Exibindo todos os imóveis disponíveis</h3>
        <div class="linha-decorativa"></div>

        <div id="grid-imoveis" class="grid-imoveis-container">
            </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
